aid: openly
name: Openly
description: >-
  Openly is an independent agent home insurance platform founded in 2017 and
  headquartered in Boston, Massachusetts. The company provides REST APIs for
  generating homeowners insurance quotes, binding policies, managing
  endorsements, and processing renewals. Openly operates as a general agency
  and program administrator, enabling tech-savvy independent agencies to build
  custom interfaces and plug into the Openly platform on the backend. The
  platform leverages actuarial science, machine learning, and advanced
  technology to provide fully underwritten quotes in seconds, supporting primary
  residences, secondary and seasonal homes, and landlord (rented-to-others)
  policies with coverage up to $5M guaranteed replacement cost.
