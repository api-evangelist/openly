    name: Openly Quote & Bind API
    description: >-
      REST API enabling independent insurance agencies to generate homeowners
      insurance quotes, bind policies, manage endorsements, and process renewals
      programmatically. Agencies can build custom interfaces and experiences
      while connecting to Openly on the backend for quoting, underwriting,
      billing, and policy management across primary residences, secondary homes,
      and landlord policies.
